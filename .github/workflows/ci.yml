name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🧩 Generate Paraglide files
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: 🧹 Lint (ESLint & Prettier)
        run: npm run lint

      - name: 🔎 Typecheck (TypeScript)
        run: npm run check

      - name: 🧪 Unit Tests (Vitest)
        run: npm run test:unit

      - name: 🏗️ Build Project
        run: npm run build

      - name: ⚖️ Check JS budget per route (gzip)
        run: npx playwright test tests/budget.spec.ts

      - name: 🎭 E2E Tests (Playwright)
        run: npm run test:e2e

      - name: 🚀 Lighthouse CI — public routes
        run: npx lhci autorun

      # - name: 🚀 Lighthouse audit — dashboard (via Playwright auth)
      # run: npm run test:lighthouse:dashboard
